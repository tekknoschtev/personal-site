# sjschroeder.com — static site behind a Cloudflare tunnel.
# TLS terminates at Cloudflare's edge; this serves plain HTTP on the
# container. Installed to /etc/nginx/sites-available/site by site.yml.

server {
    listen 80 default_server;
    server_name sjschroeder.com;

    root /var/www/site;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # hashed build assets and fonts never change — cache hard
    location /_astro/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /fonts/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        try_files $uri $uri/index.html =404;
    }

    # Optional: same-origin proxy to Uptime Kuma so the status board
    # needs no CORS. Uncomment, fix the IP:port, and set
    # PUBLIC_KUMA_URL=/kuma in /opt/personal-site/.env, then deploy-site.
    #location /kuma/ {
    #    proxy_pass http://192.168.4.XX:3001/;
    #    proxy_http_version 1.1;
    #    proxy_set_header Host $host;
    #}
}
